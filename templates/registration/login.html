{% extends 'base.html' %}
{% load static %}

{% block title %}Вход — Квока{% endblock %}

{% block content %}
<div class="form-container">
    <div style="margin-bottom: 1rem;">
        <i class="fas fa-frog" style="font-size: 3rem; color: #FF9F66;"></i>
    </div>
    <h1>Добро пожаловать</h1>
    <p>Войди в свой аккаунт Квоки</p>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_username"><i class="fas fa-user"></i> Имя пользователя</label>
            <input type="text" name="username" id="id_username" autofocus required>
        </div>
        
        <div class="form-group">
            <label for="id_password"><i class="fas fa-lock"></i> Пароль</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        
        {% if form.errors %}
            <div class="warning" style="margin-bottom: 1rem; background: #FEE2E2; color: #DC2626;">
                <i class="fas fa-exclamation-circle"></i> Неверное имя пользователя или пароль
            </div>
        {% endif %}
        
        <button type="submit" class="btn-primary" style="width: 100%; padding: 0.75rem;">
            <i class="fas fa-sign-in-alt"></i> Войти
        </button>
    </form>
    
    <p style="margin-top: 1.5rem;">
        Нет аккаунта? <a href="{% url 'signup' %}" style="color: #FF9F66;">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}

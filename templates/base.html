<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Квока{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="nav-logo">
                <img src="{% static 'images/kvoka.png' %}" alt="Квока" class="logo-img">
                <span>квока</span>
            </a>
            
            <div class="nav-menu">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="nav-link">
                        <i class="fas fa-clock"></i> фокус
                    </a>
                    <a href="{% url 'session_history' %}" class="nav-link">
                        <i class="fas fa-history"></i> история
                    </a>
                    <a href="{% url 'friends_list' %}" class="nav-link">
                        <i class="fas fa-users"></i> друзья
                    </a>
                    <a href="{% url 'profile' %}" class="nav-link">
                        <i class="fas fa-user"></i>
                    </a>
                    <form action="{% url 'logout' %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="nav-link" style="background: none; border: none; cursor: pointer;">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-link">войти</a>
                    <a href="{% url 'signup' %}" class="btn-primary">начать</a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer class="footer">
        <p>квока — будь в фокусе ✦</p>
    </footer>
    
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
